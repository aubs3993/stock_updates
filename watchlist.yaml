# stock_updates watchlist
# ---------------------------------------------------------------------------
# Add one entry per company you want tracked. Edit this file and commit it —
# the routine reads it fresh on every run.
#
# Fields per entry:
#   ticker        (required)  Stock ticker symbol, e.g. SATS.
#                             Use null for a private company with no SEC filings.
#   company       (required)  Company name as you'd recognize it.
#   cik           (optional)  Explicit SEC CIK number. Use when the ticker isn't
#                             in the SEC ticker map yet (pre-IPO) or for a
#                             private company that still files with the SEC.
#   focus_areas   (optional)  A list of things to prioritize for THIS company.
#                             If omitted, the default focus areas in CLAUDE.md
#                             are used.
#
# Notes:
#   - ticker and company are always paired.
#   - A company with ticker: null and no cik is tracked via web search only.
# ---------------------------------------------------------------------------

companies:
  - ticker: SATS
    company: EchoStar Corporation
    focus_areas:
      - "spectrum-sale proceeds: timing and receipt of the AT&T payment (and the deferred $183M DISH DBS coupon it needs to cure)"
      - "AT&T spectrum proceeds expected this month: any status update on whether the payment has been received, the exact amount, the closing/payment date, and any delays, conditions, or confirmations"
      - "the SpaceX spectrum payment and EchoStar's SpaceX equity stake: terms, valuation marks, lock-ups, monetization"
      - "short interest: changes in shares short, short interest as % of float, days-to-cover, and any notable short-squeeze or short-seller commentary"

  - ticker: SPCX
    company: Space Exploration Technologies Corp. (SpaceX)
    cik: 1181412  # pre-IPO: pins the EDGAR identity even if the ticker map lags
    focus_areas:
      - "IPO terms in each revised S-1/S-1A: price, share count, valuation, offering structure"
      - "lock-up terms and any changes to lock-up language"
      - "new share issuance and dilution: primary vs. secondary mix, any follow-on offerings"
      - "index inclusion / fast-tracking: any news on whether S&P (S&P 500/Dow Jones indices), Nasdaq, MSCI, FTSE Russell, or other index providers will add or fast-track SpaceX, including decisions NOT to include it and the stated reasons/timing"

  - ticker: WBD
    company: Warner Bros. Discovery, Inc.
    focus_areas:
      - "any updates on closing the acquisition: deal terms, regulatory/antitrust review and approvals, shareholder votes, financing, closing timeline, and any competing or revised bids"
      - "acquisition deal approval: status of regulatory/antitrust clearances, shareholder votes, and board/government approvals needed to approve the deal, including any conditions, rejections, or approval milestones reached"

  - ticker: LULU
    company: Lululemon Athletica Inc.

  - ticker: CVNA
    company: Carvana Co.
    focus_areas:
      - "catalyst events that could drive the stock down: negative earnings/guidance, weak unit or GPU trends, debt/liquidity concerns, dilutive equity or debt offerings, insider selling, short-seller reports, downgrades, regulatory or legal actions, or any other negative catalyst"

  # To add more later, copy the pattern above. Optional focus_areas example:
  # - ticker: NVDA
  #   company: NVIDIA Corporation
  #   focus_areas:
  #     - data center GPU demand and supply
  #     - export controls and China revenue
